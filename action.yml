name: 'Semantic Release Creator'
description: 'Creates Git tags, commits version bumps, and publishes GitHub releases with development cycle support'
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  release-tag:
    description: 'The release tag to create'
    required: true
  changelog:
    description: 'The changelog/release notes content'
    required: true
  next-dev-version:
    description: 'Next development version (for final releases)'
    required: false
  stage-label:
    description: 'Release stage label (alpha, beta, final, snapshot)'
    required: true
  repository:
    description: 'Repository name (owner/repo)'
    required: false
    default: ${{ github.repository }}
  backend-file:
    description: 'Path to Maven pom.xml file'
    required: false
    default: 'pom.xml'
  frontend-file:
    description: 'Path to Node.js package.json file'
    required: false
    default: 'frontend/package.json'
  github-token:
    description: 'GitHub token for creating releases'
    required: true
  branch:
    description: 'Branch to push changes to'
    required: false
    default: 'develop'
  config-file:
    description: 'Path to configuration file (config.json)'
    required: false
    default: ''

outputs:
  release-url:
    description: 'URL of the created GitHub release'
    value: ${{ steps.create-release.outputs.html_url }}
  release-id:
    description: 'ID of the created GitHub release'
    value: ${{ steps.create-release.outputs.id }}

runs:
  using: 'composite'
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Load configuration
      shell: bash
      run: |
        CONFIG_FILE="${{ inputs.config-file }}"

        # Set default values
        BACKEND_FILE="${{ inputs.backend-file }}"
        FRONTEND_FILE="${{ inputs.frontend-file }}"
        RELEASE_COMMIT_TEMPLATE="chore(release): bump version to {version}"

        # Load basic config if file exists
        if [ -n "$CONFIG_FILE" ] && [ -f "$CONFIG_FILE" ]; then
          echo "📄 Loading configuration from $CONFIG_FILE"

          # Improved config parsing using more robust patterns
          if grep -q '"maven"' "$CONFIG_FILE"; then
            MAVEN_PATH=$(grep -o '"maven"[^}]*"path"[[:space:]]*:[[:space:]]*"[^"]*"' "$CONFIG_FILE" | sed 's/.*"path"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || echo "")
            [ -n "$MAVEN_PATH" ] && BACKEND_FILE="$MAVEN_PATH"
          fi

          if grep -q '"nodejs"' "$CONFIG_FILE"; then
            NODEJS_PATH=$(grep -o '"nodejs"[^}]*"path"[[:space:]]*:[[:space:]]*"[^"]*"' "$CONFIG_FILE" | sed 's/.*"path"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || echo "")
            [ -n "$NODEJS_PATH" ] && FRONTEND_FILE="$NODEJS_PATH"
          fi

          if grep -q '"releaseTemplate"' "$CONFIG_FILE"; then
            RELEASE_TEMPLATE=$(grep -o '"releaseTemplate"[[:space:]]*:[[:space:]]*"[^"]*"' "$CONFIG_FILE" | sed 's/.*"releaseTemplate"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || echo "")
            [ -n "$RELEASE_TEMPLATE" ] && RELEASE_COMMIT_TEMPLATE="$RELEASE_TEMPLATE"
          fi

          echo "✅ Configuration loaded: backend=$BACKEND_FILE, frontend=$FRONTEND_FILE"
        else
          echo "📄 No configuration file provided, using defaults"
        fi

        # Export variables for subsequent steps
        echo "BACKEND_FILE=$BACKEND_FILE" >> $GITHUB_ENV
        echo "FRONTEND_FILE=$FRONTEND_FILE" >> $GITHUB_ENV
        echo "RELEASE_COMMIT_TEMPLATE=$RELEASE_COMMIT_TEMPLATE" >> $GITHUB_ENV

    - name: Commit and tag release
      shell: bash
      run: |
        RELEASE_TAG="${{ inputs.release-tag }}"

        # Stage and commit version changes (using config values)
        FILES_TO_ADD=""
        [ -f "$BACKEND_FILE" ] && FILES_TO_ADD="$FILES_TO_ADD $BACKEND_FILE"
        [ -f "$FRONTEND_FILE" ] && FILES_TO_ADD="$FILES_TO_ADD $FRONTEND_FILE"

        if [ -n "$FILES_TO_ADD" ]; then
          git add $FILES_TO_ADD
          echo "✅ Staged files: $FILES_TO_ADD"
        else
          echo "❌ No version files found to commit!"
          echo "   Backend file: $BACKEND_FILE (exists: $([ -f "$BACKEND_FILE" ] && echo "yes" || echo "no"))"
          echo "   Frontend file: $FRONTEND_FILE (exists: $([ -f "$FRONTEND_FILE" ] && echo "yes" || echo "no"))"
          exit 1
        fi

        # Use configured commit message template
        COMMIT_MSG=$(echo "$RELEASE_COMMIT_TEMPLATE" | sed "s/{version}/$RELEASE_TAG/g")
        git diff --cached --quiet || {
          git commit -m "$COMMIT_MSG" \
                     -m "Auto-generated by semantic release automation"
        }

        # Create and push tag
        git tag -d "$RELEASE_TAG" 2>/dev/null || true
        git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
        git push origin ${{ inputs.branch }} "$RELEASE_TAG"

        echo "Created and pushed tag: $RELEASE_TAG"

    - name: Prepare next development version
      if: inputs.stage-label == 'final' && inputs.next-dev-version != ''
      shell: bash
      run: |
        NEXT_DEV="${{ inputs.next-dev-version }}"

        # Update backend to next development version
        if [ -f "${{ inputs.backend-file }}" ]; then
          sed -i "s/<version>[^<]*<\/version>/<version>$NEXT_DEV<\/version>/" ${{ inputs.backend-file }}
        fi

        # Update frontend to next development version (remove -SNAPSHOT)
        if [ -f "${{ inputs.frontend-file }}" ]; then
          NEXT_FRONTEND=$(echo "$NEXT_DEV" | sed 's/-SNAPSHOT//')
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEXT_FRONTEND\"/" ${{ inputs.frontend-file }}
        fi

        # Commit next development version
        DEV_FILES_TO_ADD=""
        [ -f "${{ inputs.backend-file }}" ] && DEV_FILES_TO_ADD="$DEV_FILES_TO_ADD ${{ inputs.backend-file }}"
        [ -f "${{ inputs.frontend-file }}" ] && DEV_FILES_TO_ADD="$DEV_FILES_TO_ADD ${{ inputs.frontend-file }}"

        if [ -n "$DEV_FILES_TO_ADD" ]; then
          git add $DEV_FILES_TO_ADD
          git commit -m "chore: prepare next development iteration $NEXT_DEV"
          git push origin ${{ inputs.branch }}
          echo "✅ Committed next development version to: $DEV_FILES_TO_ADD"
        else
          echo "⚠️ No files to update for next development version"
        fi

        echo "Prepared next development version: $NEXT_DEV"

    - name: Create GitHub Release
      id: create-release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.release-tag }}
        name: "${{ inputs.repository }} ${{ inputs.release-tag }}"
        body: |
          ## Release ${{ inputs.release-tag }}

          **Stage:** ${{ inputs.stage-label }}

          ${{ inputs.changelog }}

          ---

          **Full Changelog:** https://github.com/${{ inputs.repository }}/compare/previous...${{ inputs.release-tag }}
        prerelease: ${{ inputs.stage-label != 'final' }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Release summary
      shell: bash
      run: |
        echo "Release ${{ inputs.release-tag }} created successfully"
        echo "E2E tests will run → Images published if tests pass"
        echo "Monitor: https://github.com/${{ inputs.repository }}/actions"