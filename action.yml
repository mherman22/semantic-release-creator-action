name: 'Create Semantic Release'
description: 'Creates Git tags, commits version bumps, and publishes GitHub releases'
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  release-tag:
    description: 'The release tag to create'
    required: true
  changelog:
    description: 'The changelog/release notes content'
    required: true
  next-dev-version:
    description: 'Next development version (for final releases)'
    required: false
  stage-label:
    description: 'Release stage label (alpha, beta, final, snapshot)'
    required: true
  repository:
    description: 'Repository name (owner/repo)'
    required: false
    default: ${{ github.repository }}
  backend-file:
    description: 'Path to Maven pom.xml file'
    required: false
    default: 'pom.xml'
  frontend-file:
    description: 'Path to Node.js package.json file'
    required: false
    default: 'frontend/package.json'
  github-token:
    description: 'GitHub token for creating releases'
    required: true

outputs:
  release-url:
    description: 'URL of the created GitHub release'
    value: ${{ steps.create-release.outputs.html_url }}
  release-id:
    description: 'ID of the created GitHub release'
    value: ${{ steps.create-release.outputs.id }}

runs:
  using: 'composite'
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit and tag release
      shell: bash
      run: |
        RELEASE_TAG="${{ inputs.release-tag }}"

        # Stage and commit version changes
        git add ${{ inputs.backend-file }} ${{ inputs.frontend-file }} 2>/dev/null || git add ${{ inputs.backend-file }}
        git diff --cached --quiet || {
          git commit -m "chore(release): bump version to $RELEASE_TAG" \
                     -m "Auto-generated by semantic release automation"
        }

        # Create and push tag
        git tag -d "$RELEASE_TAG" 2>/dev/null || true
        git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
        git push origin develop "$RELEASE_TAG"

        echo "Created and pushed tag: $RELEASE_TAG"

    - name: Prepare next development version
      if: inputs.stage-label == 'final' && inputs.next-dev-version != ''
      shell: bash
      run: |
        NEXT_DEV="${{ inputs.next-dev-version }}"

        # Update backend to next development version
        sed -i "s/<version>[^<]*<\/version>/<version>$NEXT_DEV<\/version>/" ${{ inputs.backend-file }}

        # Update frontend to next development version (remove -SNAPSHOT)
        if [ -f "${{ inputs.frontend-file }}" ]; then
          NEXT_FRONTEND=$(echo "$NEXT_DEV" | sed 's/-SNAPSHOT//')
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEXT_FRONTEND\"/" ${{ inputs.frontend-file }}
        fi

        # Commit next development version
        git add ${{ inputs.backend-file }} ${{ inputs.frontend-file }} 2>/dev/null || git add ${{ inputs.backend-file }}
        git commit -m "chore: prepare next development iteration $NEXT_DEV"
        git push origin develop

        echo "Prepared next development version: $NEXT_DEV"

    - name: Create GitHub Release
      id: create-release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.release-tag }}
        name: "${{ inputs.repository }} ${{ inputs.release-tag }}"
        body: |
          ## Release ${{ inputs.release-tag }}

          **Stage:** ${{ inputs.stage-label }}

          ${{ inputs.changelog }}

          ---

          **Full Changelog:** https://github.com/${{ inputs.repository }}/compare/previous...${{ inputs.release-tag }}
        prerelease: ${{ inputs.stage-label != 'final' }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Release summary
      shell: bash
      run: |
        echo "Release ${{ inputs.release-tag }} created successfully"
        echo "E2E tests will run → Images published if tests pass"
        echo "Monitor: https://github.com/${{ inputs.repository }}/actions"